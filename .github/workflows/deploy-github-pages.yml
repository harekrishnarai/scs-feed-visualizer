name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC to fetch fresh data
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone SCS feed data
        run: |
          git clone --depth 1 https://github.com/harekrishnarai/scs-feed.git scs_feed_data
          echo "✅ Data repository cloned"

      - name: Generate CSV analysis
        run: |
          echo "📊 Analyzing SCS feed data..."
          node scripts/analyze-scs-feed.js
          echo "✅ CSV files generated"

      - name: Build Next.js application
        run: |
          echo "🔨 Building Next.js app..."
          npm run build
          echo "✅ Build complete"

      - name: Create .nojekyll file
        run: |
          touch out/.nojekyll

      - name: Verify build output
        run: |
          echo "📁 Build output contents:"
          ls -lah out/ | head -10
          echo "✅ Build verified"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Verify site is live
        run: |
          echo "🔍 Verifying deployment..."
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Deployment verified! Status: $STATUS"
            echo "📍 Site live at: $URL"
          else
            echo "❌ Verification failed - Status: $STATUS"
            exit 1
          fi
