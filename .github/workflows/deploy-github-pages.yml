name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          echo "✅ Dependencies installed"

      - name: Clone data (optional)
        id: data
        continue-on-error: true
        run: |
          echo "📥 Attempting to clone SCS feed data..."
          git clone --depth 1 https://github.com/harekrishnarai/scs-feed.git scs_feed_data || echo "⚠️  Data clone skipped - will use pre-analyzed data"
          echo "✅ Data step completed"

      - name: Generate CSV analysis (if data available)
        id: analysis
        continue-on-error: true
        run: |
          if [ -d "scs_feed_data" ]; then
            echo "📊 Analyzing SCS feed data..."
            node scripts/analyze-scs-feed.js || echo "⚠️  Analysis completed with warnings"
            echo "✅ CSV files generated"
          else
            echo "⚠️  Skipping analysis - no data directory"
          fi

      - name: Build Next.js application
        run: |
          echo "🔨 Building Next.js app..."
          npm run build
          if [ $? -eq 0 ]; then
            echo "✅ Build completed successfully"
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Create .nojekyll
        run: |
          touch out/.nojekyll
          echo "✅ Jekyll bypassed"

      - name: List build output
        run: |
          echo "📁 Output directory:"
          ls -lah out/ | head -15

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
