name: Manual Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      rebuild_data:
        description: 'Rebuild data analysis (slow, clones repo)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  manual-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild data (optional)
        if: github.event.inputs.rebuild_data == 'true'
        run: |
          echo "🔄 Rebuilding data analysis..."
          rm -rf scs_feed_data public/data
          git clone --depth 1 https://github.com/harekrishnarai/scs-feed.git scs_feed_data
          node scripts/analyze-scs-feed.js
          echo "✅ Data refreshed"

      - name: Build application
        run: |
          npm run build
          echo "✅ Build complete"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: false

      - name: Show live URL
        run: |
          echo "🎉 Deployment complete!"
          echo "📍 Live at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
